update_check_interval 3600
shell_integration no-rc
allow_remote_control socket
listen_on unix:/tmp/kitty
shell_integration enabled
window_padding_width 4
scrollback_lines 10000
notify_on_cmd_finish invisible
font_family      JetBrainsMono NF
bold_font        JetBrainsMono NF Bold
italic_font      JetBrainsMono NF Italic
bold_italic_font JetBrainsMono NF Bold Italic
font_size 12.0



# Generated from Base16 Carbon
# Main Colors
foreground            #f2f4f8
background            #161616
selection_foreground  #161616
selection_background  #f2f4f8
url_color             #33b1ff
cursor                #f2f4f8
cursor_text_color     #161616

# Tabs
active_tab_foreground   #161616
active_tab_background   #78a9ff
inactive_tab_foreground #f2f4f8
inactive_tab_background #353535

# The 16 Terminal Colors

# Black
color0 #161616
color8 #484848

# Red
color1 #ee5396
color9 #ff7eb6

# Green
color2  #25be6a
color10 #25be6a

# Yellow
color3  #08bdba
color11 #3ddbd9

# Blue
color4  #78a9ff
color12 #78a9ff

# Magenta
color5  #be95ff
color13 #be95ff

# Cyan
color6  #33b1ff
color14 #3ddbd9

# White
color7  #f2f4f8
color15 #e4e4e5


map --allow-fallback=shifted,ascii ctrl+k scroll_to_prompt -1
map --allow-fallback=shifted,ascii ctrl+j scroll_to_prompt 1
map --allow-fallback=shifted,ascii ctrl+space ungrabbed

# kitty-scrollback.nvim Kitten alias
action_alias kitty_scrollback_nvim kitten '$HOME/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py'
# Browse scrollback buffer in nvim
map kitty_mod+h kitty_scrollback_nvim
# Browse output of the last shell command in nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output
# Show clicked command output in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output
